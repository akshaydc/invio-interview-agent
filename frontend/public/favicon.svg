<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <rect width="240" height="240" rx="48" fill="#0C447C"/>
  <defs>
    <filter id="astra-blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5"></feGaussianBlur>
    </filter>
    <linearGradient id="astra-tail" gradientUnits="userSpaceOnUse" x1="200" y1="190" x2="32" y2="82">
      <stop offset="0%" stop-color="#6eb7ff" stop-opacity="1"></stop>
      <stop offset="40%" stop-color="#6eb7ff" stop-opacity="0.8"></stop>
      <stop offset="100%" stop-color="#6eb7ff" stop-opacity="0"></stop>
    </linearGradient>
    <linearGradient id="astra-tail-core" gradientUnits="userSpaceOnUse" x1="200" y1="190" x2="32" y2="82">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"></stop>
      <stop offset="20%" stop-color="#cfe6ff" stop-opacity="0.95"></stop>
      <stop offset="65%" stop-color="#6eb7ff" stop-opacity="0.65"></stop>
      <stop offset="100%" stop-color="#6eb7ff" stop-opacity="0"></stop>
    </linearGradient>
    <radialGradient id="astra-head" cx="200" cy="190" r="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"></stop>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.9"></stop>
      <stop offset="55%" stop-color="#6eb7ff" stop-opacity="0.95"></stop>
      <stop offset="100%" stop-color="#6eb7ff" stop-opacity="0"></stop>
    </radialGradient>
  </defs>
  <g stroke="#cfe6ff" stroke-width="20" stroke-linejoin="round" stroke-linecap="round">
    <path d="M 40 210 L 120 40 L 200 210"></path>
    <path d="M 72 145 L 168 145" stroke-width="16"></path>
  </g>
  <g transform="rotate(33 200 190)">
    <rect x="-210" y="178" width="210" height="24" rx="12" fill="url(#astra-tail)" filter="url(#astra-blur)"></rect>
    <rect x="-200" y="186" width="200" height="8" rx="4" fill="url(#astra-tail-core)"></rect>
  </g>
  <circle cx="200" cy="190" r="20" fill="url(#astra-head)"></circle>
  <circle cx="200" cy="190" r="5" fill="#ffffff"></circle>
</svg>
